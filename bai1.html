<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý điểm sinh viên</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .input-group { margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .bg-warning { background-color: #fff3cd; } 
        .summary { margin-top: 15px; font-weight: bold; }
        button { cursor: pointer; }
    </style>
</head>
<body>

    <h2>Quản lý điểm sinh viên</h2>

    <div class="input-group">
        <input type="text" id="txtName" placeholder="Họ tên sinh viên">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

    <div class="summary" id="summaryArea">
        Tổng số SV: 0 | Điểm trung bình: 0
    </div>
    <div class="filter-group" style="margin: 20px 0; display: flex; gap: 10px;">
    <input type="text" id="searchName" placeholder="Tìm theo tên (realtime)...">
    
    <select id="filterRank">
        <option value="All">Tất cả xếp loại</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
    </select>
</div>

<table>
    <thead>
        <tr>
            <th>STT</th>
            <th>Họ tên</th>
            <th id="sortScore" style="cursor: pointer;">Điểm <span id="sortIcon">↕</span></th>
            <th>Xếp loại</th>
            <th>Thao tác</th>
        </tr>
    </thead>
    <tbody id="studentTableBody"></tbody>
</table>
    <script src="bai1.js"></script>
</body>
</html>
