<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form đăng ký</title>
<link rel="stylesheet" href="bai2.1.css">
</head>
<body>

<div class="container">

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<div class="field">
<label>Họ và tên</label>
<input type="text" id="fullname">
<div class="error" id="fullnameError"></div>
</div>

<div class="field">
<label>Email</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>
</div>

<div class="field">
<label>Số điện thoại</label>
<input type="text" id="phone">
<div class="error" id="phoneError"></div>
</div>

<div class="field">
<label>Mật khẩu</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>
</div>

<div class="field">
<label>Xác nhận mật khẩu</label>
<input type="password" id="confirm">
<div class="error" id="confirmError"></div>
</div>

<div class="field">
<label>Giới tính</label><br>
<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ
<div class="error" id="genderError"></div>
</div>

<div class="field">
<input type="checkbox" id="terms"> Đồng ý điều khoản
<div class="error" id="termsError"></div>
</div>

<button type="submit">Đăng ký</button>

</form>

<div id="successMessage" class="success"></div>

</div>
<div class="form-group">
    <label>Họ và tên: <span id="charCount">0/50</span></label>
    <input type="text" id="fullname" maxlength="50">
    <small class="error-msg"></small>
</div>

<div class="form-group">
    <label>Mật khẩu:</label>
    <div class="password-wrapper" style="position: relative;">
        <input type="password" id="password">
        <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer;">👁️</button>
    </div>
    <div class="strength-meter" style="height: 5px; background: #ddd; margin-top: 5px; border-radius: 3px;">
        <div id="strengthBar" style="height: 100%; width: 0%; transition: 0.3s; border-radius: 3px;"></div>
    </div>
    <small id="strengthText"></small>
    <small class="error-msg"></small>
</div>
